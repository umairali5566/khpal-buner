{% extends 'base.html' %}
{% block title %}Delete Car - Khpal Buner{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card">
        <div class="card-header">
            <h4>Confirm Delete</h4>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete {{ car.year }} {{ car.brand }} {{ car.model }}?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'dealer_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
