{% extends 'base.html' %}
{% block title %}Contact Us - Khpal Buner{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="h2 mb-4">Contact Us</h1>
    
    <div class="row">
        <div class="col-lg-6">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">{{ form.name.label_tag }} {{ form.name }}</div>
                <div class="mb-3">{{ form.phone.label_tag }} {{ form.phone }}</div>
                <div class="mb-3">{{ form.message.label_tag }} {{ form.message }}</div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
